<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#0f0c29"/>
      <stop offset="45%"  style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="avatarBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <clipPath id="avatarClip">
      <circle cx="168" cy="252" r="108"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative blobs -->
  <circle cx="980" cy="80"  r="220" fill="#4c1d95" opacity="0.25"/>
  <circle cx="1100" cy="500" r="180" fill="#6d28d9" opacity="0.18"/>
  <circle cx="60"  cy="560" r="160" fill="#312e81" opacity="0.3"/>

  <!-- Grid dots pattern (subtle) -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="2" cy="2" r="1.2" fill="rgba(255,255,255,0.07)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- Left accent bar -->
  <rect x="60" y="80" width="6" height="470" rx="3" fill="url(#accent)"/>

  <!-- Avatar circle border (gradient ring) -->
  <circle cx="168" cy="252" r="114" fill="url(#avatarBorder)" opacity="0.9"/>
  <circle cx="168" cy="252" r="108" fill="#1e1b4b"/>
  <!-- Avatar initials fallback -->
  <circle cx="168" cy="252" r="108" fill="#2d2b6b" clip-path="url(#avatarClip)"/>
  <text x="168" y="272" font-family="'Segoe UI',Arial,sans-serif" font-size="64" font-weight="800"
        text-anchor="middle" fill="white" opacity="0.9">JM</text>

  <!-- Available badge -->
  <rect x="104" y="374" width="130" height="28" rx="14" fill="#16a34a" opacity="0.9"/>
  <circle cx="120" cy="388" r="5" fill="#86efac"/>
  <text x="168" y="393" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="600"
        text-anchor="middle" fill="white">Disponible</text>

  <!-- NAME -->
  <text x="330" y="185"
        font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
        font-size="82" font-weight="800" letter-spacing="-2"
        fill="white">Jean Meza</text>

  <!-- Gradient underline under name -->
  <rect x="330" y="196" width="480" height="5" rx="3" fill="url(#accent)"/>

  <!-- Title -->
  <text x="330" y="248"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="30" font-weight="300" letter-spacing="0.5"
        fill="#c4b5fd">Full Stack Developer &amp; Web Designer</text>

  <!-- Years badge -->
  <rect x="330" y="270" width="175" height="32" rx="16" fill="url(#accentBlue)" opacity="0.85"/>
  <text x="417" y="291" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="700"
        text-anchor="middle" fill="white">+8 años de experiencia</text>

  <!-- Location -->
  <text x="525" y="291" font-family="'Segoe UI',Arial,sans-serif" font-size="14"
