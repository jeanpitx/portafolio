    <rect x="330" y="338" width="90"  height="28" rx="14" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="375"  y="357" text-anchor="middle" fill="#e9d5ff">Laravel</text>

    <rect x="430" y="338" width="78"  height="28" rx="14" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="469"  y="357" text-anchor="middle" fill="#e9d5ff">React</text>

    <rect x="518" y="338" width="78"  height="28" rx="14" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="557"  y="357" text-anchor="middle" fill="#e9d5ff">Next.js</text>

    <rect x="606" y="338" width="62"  height="28" rx="14" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="637"  y="357" text-anchor="middle" fill="#e9d5ff">Java</text>

    <rect x="678" y="338" width="110" height="28" rx="14" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="733"  y="357" text-anchor="middle" fill="#e9d5ff">Spring Boot</text>

    <rect x="798" y="338" width="78"  height="28" rx="14" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="837"  y="357" text-anchor="middle" fill="#e9d5ff">Quarkus</text>

    <rect x="886" y="338" width="52"  height="28" rx="14" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="912"  y="357" text-anchor="middle" fill="#e9d5ff">Go</text>

    <rect x="948" y="338" width="88"  height="28" rx="14" fill="rgba(168,85,247,0.2)" stroke="#a855f7" stroke-width="1"/>
    <text x="992"  y="357" text-anchor="middle" fill="#e9d5ff">.NET / C#</text>

    <!-- Row 2 -->
    <rect x="330" y="376" width="80"  height="28" rx="14" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="370"  y="395" text-anchor="middle" fill="#c7d2fe">Docker</text>

    <rect x="420" y="376" width="72"  height="28" rx="14" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="456"  y="395" text-anchor="middle" fill="#c7d2fe">Azure</text>

    <rect x="502" y="376" width="60"  height="28" rx="14" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="532"  y="395" text-anchor="middle" fill="#c7d2fe">AWS</text>

    <rect x="572" y="376" width="100" height="28" rx="14" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="622"  y="395" text-anchor="middle" fill="#c7d2fe">TypeScript</text>

    <rect x="682" y="376" width="78"  height="28" rx="14" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="721"  y="395" text-anchor="middle" fill="#c7d2fe">Node.js</text>

    <rect x="770" y="376" width="80"  height="28" rx="14" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="810"  y="395" text-anchor="middle" fill="#c7d2fe">MySQL</text>

    <rect x="860" y="376" width="94"  height="28" rx="14" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="907"  y="395" text-anchor="middle" fill="#c7d2fe">Oracle DB</text>

    <rect x="964" y="376" width="82"  height="28" rx="14" fill="rgba(99,102,241,0.2)" stroke="#6366f1" stroke-width="1"/>
    <text x="1005" y="395" text-anchor="middle" fill="#c7d2fe">MongoDB</text>
  </g>

  <!-- Bottom divider -->
  <rect x="0" y="490" width="1200" height="1" fill="rgba(255,255,255,0.08)"/>

  <!-- Bottom bar -->
  <rect x="0" y="491" width="1200" height="139" fill="rgba(0,0,0,0.25)"/>

  <!-- Contact info row -->
  <g font-family="'Segoe UI',Arial,sans-serif" font-size="18" fill="#a5b4fc">
    <text x="90"  y="548">✉  yojean02@hotmail.com</text>
    <text x="420" y="548">📞  +593 960-445-403</text>
    <text x="700" y="548">🔗  linkedin.com/in/jeanpitx</text>
    <text x="990" y="548">🐙  github.com/jeanpitx</text>
  </g>

  <!-- Portfolio URL -->
  <text x="600" y="601"
        font-family="'Segoe UI',Arial,sans-serif"
        font-size="20" font-weight="600" text-anchor="middle"
        fill="rgba(255,255,255,0.4)">jeanpitx.github.io/portafolio</text>
</svg>
