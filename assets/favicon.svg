<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f0c29"/>
      <stop offset="50%"  stop-color="#302b63"/>
      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="50%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="jm" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#e9d5ff"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Gradient ring border -->
  <rect x="0" y="0" width="64" height="64" rx="16" fill="url(#ring)"/>

  <!-- Dark background inset -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="14" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="14" y="10" width="36" height="3" rx="1.5" fill="url(#bar)" opacity="0.8"/>

  <!-- Bracket left: < -->
  <text x="6" y="40"
        font-family="'Courier New', Courier, monospace"
        font-size="16" font-weight="700"
        fill="#a855f7" opacity="0.7">&lt;</text>

  <!-- Initials JM -->
  <text x="32" y="41"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="20" font-weight="800"
        text-anchor="middle" letter-spacing="-0.5"
        fill="url(#jm)">JM</text>

  <!-- Bracket right: > -->
  <text x="47" y="40"
        font-family="'Courier New', Courier, monospace"
        font-size="16" font-weight="700"
        fill="#ec4899" opacity="0.7">&gt;</text>

  <!-- Bottom accent line -->
  <rect x="14" y="51" width="36" height="3" rx="1.5" fill="url(#bar)" opacity="0.8"/>
</svg>
